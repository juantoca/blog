<svg width="200" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="WindPattern" x="0" y="0" width="100" height="100" style="transform: rotate(var(--wind-direction, 0deg))" patternUnits="userSpaceOnUse">
      <g stroke="#3b82f6" stroke-linecap="round" stroke-linejoin="round" stroke-width="3">
        <path d="M 25,75 L 25,25" />
        <path d="M 15,35 L 25,25 L 35,35" fill="none" />
        
        <path d="M 75,100 L 75,50" />
        <path d="M 65,60 L 75,50 L 85,60" fill="none" />
      </g>
      <animate attributeName="y" from="0" to="-100" dur="1.5s" repeatCount="indefinite" />
    </pattern>
  </defs>

  <rect fill="url(#WindPattern)" width="100%" height="100%" />
</svg>
